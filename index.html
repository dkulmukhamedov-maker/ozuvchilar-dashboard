<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дашборд по похудению</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d1a;color:#e0e0f0;font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;min-height:100vh}
a{color:inherit;text-decoration:none}
.header{background:#12122a;border-bottom:1px solid #2a2a4a;padding:14px 24px}
.header h1{font-size:20px;font-weight:700;color:#a78bfa}
.header h1 span{margin-right:8px}
.header p{font-size:12px;color:#6b6b9a;margin-top:2px}
.nav{background:#12122a;border-bottom:1px solid #2a2a4a;padding:0 24px;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-btn{padding:10px 16px;border:none;background:none;color:#6b6b9a;cursor:pointer;font-size:13px;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s}
.nav-btn:hover{color:#c4b5fd}
.nav-btn.active{color:#a78bfa;border-bottom-color:#a78bfa;font-weight:500}
.nav-btn.person-btn.active{color:#fff;background:#a78bfa22;border-radius:4px 4px 0 0}
.content{padding:24px;max-width:1400px;margin:0 auto}
.tab-panel{display:none}
.tab-panel.active{display:block}
.section-title{font-size:18px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.table-wrap{overflow-x:auto;border-radius:8px;border:1px solid #2a2a4a}
table{width:100%;border-collapse:collapse}
thead th{background:#1a1a35;padding:10px 16px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#6b6b9a;font-weight:600;white-space:nowrap}
tbody tr{border-top:1px solid #1e1e38;transition:background .15s}
tbody tr:hover{background:#1a1a30}
td{padding:12px 16px;white-space:nowrap}
.medal{font-size:16px;width:28px;display:inline-block;text-align:center}
.rank-num{color:#6b6b9a;font-weight:500}
.val-start{color:#8888aa}
.val-now{color:#a78bfa;font-weight:600;font-size:15px}
.val-goal{color:#34d399;font-weight:600}
.val-pace{color:#34d399;font-weight:500}
.val-red{color:#f87171}
.change{display:flex;align-items:center;gap:8px}
.change-val{font-weight:600;min-width:60px}
.change-val.neg{color:#34d399}
.change-val.pos{color:#f87171}
.progress-bar{height:6px;background:#1e1e38;border-radius:3px;width:80px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#34d399,#059669);border-radius:3px;transition:width .5s}
.check-yes{color:#34d399;font-size:16px}
.check-no{color:#f87171;font-size:16px}
.days-val{color:#6b6b9a}
.kcal-val{color:#f0f0ff;font-weight:600}
.protein-val{color:#34d399;font-weight:600}
.fat-val{color:#fb923c;font-weight:600}
.carb-val{color:#a78bfa;font-weight:600}
.person-header{font-size:22px;font-weight:700;margin-bottom:20px;color:#fff}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:#1a1a35;border:1px solid #2a2a4a;border-radius:8px;padding:16px}
.stat-label{font-size:11px;color:#6b6b9a;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat-value{font-size:22px;font-weight:700;color:#fff}
.stat-sub{font-size:12px;color:#6b6b9a;margin-top:4px}
.stat-badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;margin-top:4px;background:#34d39922;color:#34d399}
.stat-badge.red{background:#f8717122;color:#f87171}
.chart-card{background:#1a1a35;border:1px solid #2a2a4a;border-radius:8px;padding:20px;margin-bottom:20px}
.chart-label{font-size:11px;color:#6b6b9a;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.chart-wrap{position:relative;height:200px}
.kbzhu-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-top:16px}
.kbzhu-card{background:#1a1a35;border:1px solid #2a2a4a;border-radius:8px;padding:14px;text-align:center}
.kbzhu-card .k-label{font-size:11px;color:#6b6b9a;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.kbzhu-card .k-val{font-size:24px;font-weight:700}
.kbzhu-card.kcal .k-val{color:#f0f0ff}
.kbzhu-card.protein .k-val{color:#34d399}
.kbzhu-card.fat .k-val{color:#fb923c}
.kbzhu-card.carb .k-val{color:#a78bfa}
.loading{text-align:center;padding:60px;color:#6b6b9a}
.loading-spinner{width:36px;height:36px;border:3px solid #2a2a4a;border-top-color:#a78bfa;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.no-data{color:#6b6b9a;font-style:italic;padding:4px 0}
</style>
</head>
<body>
<div class="header">
  <h1><span>💪</span>Дашборд по похудению</h1>
  <p id="subtitle">Озувчилар группаси · Загрузка...</p>
</div>
<nav class="nav" id="nav">
  <button class="nav-btn active" onclick="showTab('rating')">🏆 Рейтинг</button>
  <button class="nav-btn" onclick="showTab('tempo')">⚡ Темп</button>
  <button class="nav-btn" onclick="showTab('kbzhu')">🥗 КБЖУ</button>
</nav>
<div class="content">
  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
    Загрузка данных...
  </div>
  <div class="tab-panel" id="tab-rating">
    <div class="section-title">🏆 Рейтинг по потере веса</div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>#</th><th>Участник</th><th>Старт</th><th>Сейчас</th><th>Изменение</th><th>Сегодня</th><th>Дней</th></tr></thead>
        <tbody id="rating-body"></tbody>
      </table>
    </div>
  </div>
  <div class="tab-panel" id="tab-tempo">
    <div class="section-title">⚡ Темп похудения</div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>#</th><th>Участник</th><th>Сейчас</th><th>Цель</th><th>Ср. в неделю</th><th>До цели</th><th>Сегодня</th></tr></thead>
        <tbody id="tempo-body"></tbody>
      </table>
    </div>
  </div>
  <div class="tab-panel" id="tab-kbzhu">
    <div class="section-title">🥗 КБЖУ — средние значения</div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Участник</th><th>Ккал ср.</th><th>Белок</th><th>Жиры</th><th>Углеводы</th><th>Дней</th></tr></thead>
        <tbody id="kbzhu-body"></tbody>
      </table>
    </div>
  </div>
</div>
<script>
const SHEET_CSV_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vREFejU340Q2jyM12ySDwM26jMYgY1U1rVkNFOgU4ebkCRmHiTEH4vUDVzGtMlUdTKUFmjFwRfusLYt/pub?gid=1836739327&single=true&output=csv';
const MEMBERS_CSV_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vREFejU340Q2jyM12ySDwM26jMYgY1U1rVkNFOgU4ebkCRmHiTEH4vUDVzGtMlUdTKUFmjFwRfusLYt/pub?gid=0&single=true&output=csv';
const GROUP_NAME='Озувчилар группаси';
let allData=[],members={},personCharts={};
function parseCSV(text){return text.trim().split('\n').map(line=>{const cols=[];let cur='',inQ=false;for(let c of line){if(c==='"')inQ=!inQ;else if(c===','&&!inQ){cols.push(cur.trim());cur='';}else cur+=c;}cols.push(cur.trim());return cols;});}
function today(){return new Date().toISOString().slice(0,10);}
function weeksAgo(dateStr,ref){const d=new Date(dateStr),r=new Date(ref||today());return Math.abs((r-d)/(7*86400000));}
function medal(rank){if(rank===1)return'<span class="medal">🥇</span>';if(rank===2)return'<span class="medal">🥈</span>';if(rank===3)return'<span class="medal">🥉</span>';return`<span class="rank-num">${rank}</span>`;}
async function loadData(){try{const[dataResp,membersResp]=await Promise.all([fetch(SHEET_CSV_URL),fetch(MEMBERS_CSV_URL)]);const dataText=await dataResp.text();const membersText=await membersResp.text();const mRows=parseCSV(membersText);const mHeaders=mRows[0].map(h=>h.replace(/"/g,''));for(let i=1;i<mRows.length;i++){const r={};mHeaders.forEach((h,j)=>r[h]=mRows[i][j]?.replace(/"/g,'')||'');if(r['Имя'])members[r['Имя']]={start:parseFloat(r['Начальный вес'])||0,goal:parseFloat(r['Цель'])||0,since:r['Дата старта']||''};}const dRows=parseCSV(dataText);const dHeaders=dRows[0].map(h=>h.replace(/"/g,''));allData=[];for(let i=1;i<dRows.length;i++){const r={};dHeaders.forEach((h,j)=>r[h]=dRows[i][j]?.replace(/"/g,'')||'');if(r['Участник'])allData.push({date:r['Дата']?.slice(0,10)||'',name:r['Участник'],weight:parseFloat(r['Вес (кг)'])||null,calories:parseFloat(r['Калории'])||null,protein:parseFloat(r['Белки'])||null,fat:parseFloat(r['Жиры'])||null,carbs:parseFloat(r['Углеводы'])||null});}document.getElementById('loading').style.display='none';document.getElementById('subtitle').textContent=`${GROUP_NAME} · Обновлено ${new Date().toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'})}`;buildDashboard();}catch(e){document.getElementById('loading').innerHTML=`<div style="color:#f87171">Ошибка загрузки данных.<br><small>${e.message}</small></div>`;}}
function buildDashboard(){const nameSet=[...new Set(allData.map(r=>r.name))];Object.keys(members).forEach(n=>{if(!nameSet.includes(n))nameSet.push(n);});const todayStr=today();const stats=nameSet.map(name=>{const rows=allData.filter(r=>r.name===name).sort((a,b)=>a.date.localeCompare(b.date));const weightRows=rows.filter(r=>r.weight);const m=members[name]||{start:0,goal:0,since:''};const currentWeight=weightRows.length?weightRows[weightRows.length-1].weight:null;const startWeight=m.start||(weightRows.length?weightRows[0].weight:null);const goal=m.goal||0;const change=(startWeight&&currentWeight)?+(currentWeight-startWeight).toFixed(1):null;const daysWithData=weightRows.length;let pace=null;if(weightRows.length>=2){const first=weightRows[0],last=weightRows[weightRows.length-1];const weeks=weeksAgo(first.date,last.date)||1;pace=+((last.weight-first.weight)/weeks).toFixed(2);}let weeksToGoal=null;if(pace&&pace<0&&currentWeight&&goal&&currentWeight>goal){weeksToGoal=+((currentWeight-goal)/Math.abs(pace)).toFixed(1);}const todayRow=rows.find(r=>r.date===todayStr&&r.weight);const reportedToday=!!todayRow;const maxChange=startWeight?startWeight-goal:20;const actualChange=startWeight&&currentWeight?startWeight-currentWeight:0;const pct=maxChange>0?Math.min(100,Math.max(0,(actualChange/maxChange)*100)):0;const kRows=rows.filter(r=>r.calories);const avgCal=kRows.length?Math.round(kRows.reduce((s,r)=>s+(r.calories||0),0)/kRows.length):null;const avgProt=kRows.length?Math.round(kRows.reduce((s,r)=>s+(r.protein||0),0)/kRows.length):null;const avgFat=kRows.length?Math.round(kRows.reduce((s,r)=>s+(r.fat||0),0)/kRows.length):null;const avgCarb=kRows.length?Math.round(kRows.reduce((s,r)=>s+(r.carbs||0),0)/kRows.length):null;return{name,startWeight,currentWeight,goal,change,pct,pace,weeksToGoal,reportedToday,daysWithData,avgCal,avgProt,avgFat,avgCarb,rows:weightRows,kRows};});buildRating([...stats].sort((a,b)=>(a.change||0)-(b.change||0)));buildTempo([...stats].sort((a,b)=>(a.pace||0)-(b.pace||0)));buildKbzhu(stats.filter(s=>s.avgCal));buildPersonTabs(stats);}
function fmt(v,unit='кг'){if(v==null)return'<span class="no-data">—</span>';return`${v} ${unit}`;}
function buildRating(sorted){const tbody=document.getElementById('rating-body');tbody.innerHTML=sorted.map((s,i)=>{const changeStr=s.change!=null?`<span class="change-val ${s.change<0?'neg':'pos'}">${s.change>0?'+':''}${s.change} кг</span><div class="progress-bar"><div class="progress-fill" style="width:${s.pct}%"></div></div>`:'<span class="no-data">—</span>';return`<tr><td>${medal(i+1)}</td><td><strong>${s.name}</strong></td><td class="val-start">${fmt(s.startWeight)}</td><td class="val-now">${fmt(s.currentWeight)}</td><td><div class="change">${changeStr}</div></td><td>${s.reportedToday?'<span class="check-yes">✅</span>':'<span class="check-no">✗</span>'}</td><td class="days-val">${s.daysWithData}</td></tr>`;}).join('');}
function buildTempo(sorted){const tbody=document.getElementById('tempo-body');tbody.innerHTML=sorted.map((s,i)=>`<tr><td>${medal(i+1)}</td><td><strong>${s.name}</strong></td><td class="val-now">${fmt(s.currentWeight)}</td><td class="val-goal">${fmt(s.goal)}</td><td class="${s.pace<0?'val-pace':'val-red'}">${s.pace!=null?s.pace+' кг/нед':'<span class="no-data">—</span>'}</td><td>${s.weeksToGoal!=null?`<strong>${s.weeksToGoal} нед</strong>`:'<span class="no-data">—</span>'}</td><td>${s.reportedToday?'<span class="check-yes">✅</span>':'<span class="check-no">✗</span>'}</td></tr>`).join('');}
function buildKbzhu(stats){const tbody=document.getElementById('kbzhu-body');tbody.innerHTML=stats.map(s=>`<tr><td><strong>${s.name}</strong></td><td class="kcal-val">${s.avgCal??'—'}</td><td class="protein-val">${s.avgProt!=null?s.avgProt+'г':'—'}</td><td class="fat-val">${s.avgFat!=null?s.avgFat+'г':'—'}</td><td class="carb-val">${s.avgCarb!=null?s.avgCarb+'г':'—'}</td><td class="days-val">${s.kRows.length}</td></tr>`).join('');}
function buildPersonTabs(stats){const nav=document.getElementById('nav');const content=document.querySelector('.content');stats.forEach(s=>{const btn=document.createElement('button');btn.className='nav-btn person-btn';btn.textContent=s.name;btn.onclick=()=>showTab('person-'+s.name);nav.appendChild(btn);const panel=document.createElement('div');panel.className='tab-panel';panel.id='tab-person-'+s.name;const goal=s.goal||0;const pctDone=(s.startWeight&&s.currentWeight&&goal)?Math.round(((s.startWeight-s.currentWeight)/(s.startWeight-goal))*100):0;panel.innerHTML=`<div class="person-header">${s.name}</div><div class="stats-grid"><div class="stat-card"><div class="stat-label">Старт</div><div class="stat-value">${fmt(s.startWeight)}</div></div><div class="stat-card"><div class="stat-label">Сейчас</div><div class="stat-value val-now">${fmt(s.currentWeight)}</div>${s.change!=null?`<div class="stat-badge ${s.change>0?'red':''}">${s.change>0?'+':''}${s.change} кг</div>`:''}</div><div class="stat-card"><div class="stat-label">Цель</div><div class="stat-value val-goal">${fmt(goal)}</div><div class="stat-sub">${pctDone}% выполнено</div></div><div class="stat-card"><div class="stat-label">Ср. в нед</div><div class="stat-value" style="font-size:18px;color:${s.pace&&s.pace<0?'#34d399':'#f87171'}">${s.pace!=null?s.pace+' кг':'—'}</div></div><div class="stat-card"><div class="stat-label">Дней с данными</div><div class="stat-value">${s.daysWithData}</div></div></div><div class="chart-card"><div class="chart-label">Динамика веса (кг)</div><div class="chart-wrap"><canvas id="chart-${s.name.replace(/\s/g,'_')}"></canvas></div></div><div class="chart-card"><div class="chart-label">КБЖУ — средние значения</div><div class="kbzhu-grid"><div class="kbzhu-card kcal"><div class="k-label">Калории</div><div class="k-val">${s.avgCal??'—'}</div></div><div class="kbzhu-card protein"><div class="k-label">Белки</div><div class="k-val">${s.avgProt!=null?s.avgProt+'г':'—'}</div></div><div class="kbzhu-card fat"><div class="k-label">Жиры</div><div class="k-val">${s.avgFat!=null?s.avgFat+'г':'—'}</div></div><div class="kbzhu-card carb"><div class="k-label">Углеводы</div><div class="k-val">${s.avgCarb!=null?s.avgCarb+'г':'—'}</div></div></div></div>`;content.appendChild(panel);personCharts[s.name]={rows:s.rows,rendered:false,goal:s.goal};});}
function renderPersonChart(name){const info=personCharts[name];if(!info||info.rendered)return;info.rendered=true;const canvas=document.getElementById('chart-'+name.replace(/\s/g,'_'));if(!canvas)return;new Chart(canvas,{type:'line',data:{labels:info.rows.map(r=>r.date.slice(5)),datasets:[{label:'Вес',data:info.rows.map(r=>r.weight),borderColor:'#a78bfa',backgroundColor:'rgba(167,139,250,0.1)',borderWidth:2,pointRadius:3,tension:0.3,fill:true},{label:'Цель',data:info.rows.map(()=>info.goal||null),borderColor:'#34d399',borderWidth:1.5,borderDash:[4,4],pointRadius:0,fill:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8888aa',font:{size:11}}}},scales:{x:{ticks:{color:'#6b6b9a',font:{size:10}},grid:{color:'#1e1e38'}},y:{ticks:{color:'#6b6b9a',font:{size:10}},grid:{color:'#1e1e38'}}}}});}
function showTab(id){document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));const panel=document.getElementById('tab-'+id);if(panel)panel.classList.add('active');document.querySelectorAll('.nav-btn').forEach(b=>{const btnId=b.onclick?.toString().match(/'([^']+)'/)?.[1];if(btnId===id)b.classList.add('active');});if(id.startsWith('person-'))renderPersonChart(id.replace('person-',''));}
loadData().then(()=>showTab('rating'));
</script>
</body>
</html>
